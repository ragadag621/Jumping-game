
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pages/game.css">
    <script src="pages/main.js" defer></script>
    <audio id="jumpSound" src="audio/jump.mp3"></audio>
    <audio id="gameoverSound" src="audio/gameover.mp3"></audio>
    <audio id="pointSound" src="audio/point.mp3"></audio>
    <title>jumping game </title>
</head>
<body>
    <h1>Jumping Game</h1>
   <section class="game-wrapper">
    <canvas id="game"></canvas>
    <div class="hud">Score: <span id="score">0</span> <p>High Score: <span id="highScore">0</span></p>
</div>

        <div id="startOverlay" class="overlay">
            <h2>Press Space to Start</h2>
            <p>Jump over the obstacles!... <br> but watch out for the spikes! <br> They will end your game.</p>
        </div>

        <div id="gameOverOverlay" class="overlay hidden">
            <h2>Game Over</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>High Score: <span id="finallhighScore">0</span></p>
            <p>Press Space to Restart</p>
        </div>
    

    
</body>
</html>
